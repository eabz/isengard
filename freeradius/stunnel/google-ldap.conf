# TLS proxy to Google Secure LDAP (avoids GnuTLS/OpenSSL conflict in FreeRADIUS).
# Started automatically by docker-entrypoint.sh.

foreground = yes
pid =

[google-ldap]
client = yes
accept = 127.0.0.1:1636
connect = ldap.google.com:636
cert = /etc/raddb/certs/google/ldap-client.crt
key = /etc/raddb/certs/google/ldap-client.key
checkHost = ldap.google.com
verifyChain = yes
CAfile = /etc/ssl/certs/ca-certificates.crt
