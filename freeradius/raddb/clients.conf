# FreeRADIUS client definitions
# Change the shared secret before production use.

# Docker bridge gateway — radtest from the host via published ports arrives
# with this source IP (e.g. 172.18.0.1), not 127.0.0.1.
client docker_gateway {
    ipaddr = 172.16.0.0/12
    secret = CHANGE_ME
    require_message_authenticator = no
    nas_type = other
}

# Local testing from inside the container network
client localhost {
    ipaddr = 127.0.0.1
    secret = CHANGE_ME
    require_message_authenticator = no
    nas_type = other
}

client local_lan {
    ipaddr = 10.0.0.0/19
    secret = CHANGE_ME
    shortname = local-lan
    nas_type = other
}
