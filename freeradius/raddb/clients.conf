# RADIUS clients (who may send auth requests).
#
# The shared secret must match what you configure on each access point / WLC.

# Wireless access points / LAN. CHANGE the secret to match your APs.
client local_lan {
	ipaddr = 10.0.0.0/19
	secret = CHANGE_ME
	shortname = local-lan
	nas_type = other
}

# Loopback — used by scripts/radius-test-auth.sh (docker exec → 127.0.0.1).
client localhost {
	ipaddr = 127.0.0.1
	secret = testing123
	shortname = localhost
	nas_type = other
}

# Docker bridge — tests sent from the host hit a published port and arrive
# from the container's bridge network, not 127.0.0.1.
client docker_bridge {
	ipaddr = 172.16.0.0/12
	secret = testing123
	shortname = docker-bridge
	nas_type = other
}
