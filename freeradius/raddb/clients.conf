# FreeRADIUS client definitions
# Change the shared secret before production use.

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    require_message_authenticator = no
    nas_type = other
}

client local_lan {
    ipaddr = 10.0.0.0/19
    secret = changeme
    shortname = local-lan
    nas_type = other
}
