# FreeRADIUS client definitions
# Change the shared secret before production use.

client local_lan {
	ipaddr = 10.0.0.0/19
	secret = CHANGE_ME
	shortname = local-lan
	nas_type = other
}

# docker exec … radclient 127.0.0.1:18120  → source 127.0.0.1 (radius-test-auth.sh)
client localhost {
	ipaddr = 127.0.0.1
	secret = testing123
	shortname = localhost
	nas_type = other
}

# Host → published port 127.0.0.1:1812; container sees Docker bridge IP, not 127.0.0.1
client docker_bridge {
	ipaddr = 172.16.0.0/12
	secret = testing123
	shortname = docker-bridge
	nas_type = other
}
