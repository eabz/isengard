# FreeRADIUS client definitions
# Change the shared secret before production use.

client local_lan {
	ipaddr = 10.0.0.0/19
	secret = CHANGE_ME
	shortname = local-lan
	nas_type = other
}

# Local tests: scripts/radius-test-auth.sh uses secret testing123 on inner-tunnel :18120
client localhost {
	ipaddr = 127.0.0.1
	secret = testing123
	shortname = localhost
	nas_type = other
}
