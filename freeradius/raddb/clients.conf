# FreeRADIUS client definitions
# Change the shared secret before production use.

# Local testing from the server itself (radtest ... 127.0.0.1 ...)
client localhost {
    ipaddr = 127.0.0.1
    secret = CHANGE_ME
    require_message_authenticator = no
    nas_type = other
}

client local_lan {
    ipaddr = 10.0.0.0/19
    secret = CHANGE_ME
    shortname = local-lan
    nas_type = other
}
