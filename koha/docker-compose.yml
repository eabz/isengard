services:
  koha:
    image: teogramm/koha:${KOHA_VERSION:-24.11}
    container_name: koha
    restart: unless-stopped
    cap_add:
      - DAC_READ_SEARCH
      - SYS_NICE
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_started
      memcached:
        condition: service_started
    environment:
      MYSQL_SERVER: db
      MYSQL_USER: ${KOHA_DB_USER}
      MYSQL_PASSWORD: ${KOHA_DB_PASSWORD}
      DB_NAME: ${KOHA_DB_NAME}
      MEMCACHED_SERVERS: memcached:11211
      MB_HOST: rabbitmq
    ports:
      - "${HOST_BIND_IP}:8080:8080"   # OPAC
      - "${HOST_BIND_IP}:8081:8081"   # Staff interface
    networks:
      - koha
    volumes:
      - koha-data:/var/lib/koha

  db:
    image: mariadb:11
    container_name: koha-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${KOHA_DB_NAME}
      MARIADB_USER: ${KOHA_DB_USER}
      MARIADB_PASSWORD: ${KOHA_DB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - koha

  memcached:
    image: memcached:alpine
    container_name: koha-memcached
    restart: unless-stopped
    command: memcached -m 128m
    networks:
      - koha

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: koha-rabbitmq
    restart: unless-stopped
    volumes:
      - ./rabbitmq_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - koha

networks:
  koha:
    driver: bridge

volumes:
  koha-data:
  mariadb-data:
